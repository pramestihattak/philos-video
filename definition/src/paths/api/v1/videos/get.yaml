get:
  operationId: GetVideo
  summary: Get a video by ID
  tags: [videos]
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
  responses:
    '200':
      description: Video details
      content:
        application/json:
          schema:
            $ref: '../../../components/schemas/Video.yaml'
    '404':
      description: Video not found
      content:
        application/json:
          schema:
            $ref: '../../../components/schemas/Error.yaml'
