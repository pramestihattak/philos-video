delete:
  operationId: DeleteVideo
  summary: Delete a video
  tags: [videos]
  security:
    - CookieAuth: []
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
  responses:
    '204':
      description: Video deleted
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '../../../components/schemas/Error.yaml'
    '404':
      description: Video not found
      content:
        application/json:
          schema:
            $ref: '../../../components/schemas/Error.yaml'
