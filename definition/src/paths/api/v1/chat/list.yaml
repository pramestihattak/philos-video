get:
  operationId: ListChatMessages
  summary: List chat messages for a live stream
  tags: [chat]
  parameters:
    - name: stream_id
      in: path
      required: true
      schema:
        type: string
    - $ref: '../../../components/parameters/LimitParam.yaml'
    - name: offset
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0
  responses:
    '200':
      description: List of chat messages
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../../../components/schemas/ChatMessage.yaml'
