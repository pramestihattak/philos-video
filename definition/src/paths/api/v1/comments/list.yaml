get:
  operationId: ListComments
  summary: List comments for a video
  tags: [comments]
  parameters:
    - name: video_id
      in: path
      required: true
      schema:
        type: string
    - $ref: '../../../components/parameters/LimitParam.yaml'
    - name: offset
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0
  responses:
    '200':
      description: List of comments
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../../../components/schemas/Comment.yaml'
