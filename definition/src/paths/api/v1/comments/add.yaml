post:
  operationId: AddComment
  summary: Add a comment to a video
  tags: [comments]
  security:
    - CookieAuth: []
  parameters:
    - name: video_id
      in: path
      required: true
      schema:
        type: string
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - body
          properties:
            body:
              type: string
              minLength: 1
              maxLength: 2000
  responses:
    '201':
      description: Comment added
      content:
        application/json:
          schema:
            $ref: '../../../components/schemas/Comment.yaml'
    '400':
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '../../../components/schemas/Error.yaml'
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '../../../components/schemas/Error.yaml'
