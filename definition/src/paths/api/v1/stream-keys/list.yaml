get:
  operationId: ListStreamKeys
  summary: List active stream keys for the current user
  tags: [stream-keys]
  security:
    - CookieAuth: []
  responses:
    '200':
      description: List of stream keys
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../../../components/schemas/StreamKey.yaml'
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '../../../components/schemas/Error.yaml'
