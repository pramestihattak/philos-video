delete:
  operationId: DeactivateStreamKey
  summary: Deactivate a stream key
  tags: [stream-keys]
  security:
    - CookieAuth: []
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
  responses:
    '204':
      description: Stream key deactivated
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '../../../components/schemas/Error.yaml'
    '404':
      description: Stream key not found
      content:
        application/json:
          schema:
            $ref: '../../../components/schemas/Error.yaml'
