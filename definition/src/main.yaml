openapi: 3.0.3
info:
  title: PramTube API
  description: Self-hosted video streaming platform API
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Local development

components:
  securitySchemes:
    CookieAuth:
      $ref: './components/securitySchemes/CookieAuth.yaml'
  schemas:
    Error:
      $ref: './components/schemas/Error.yaml'
    User:
      $ref: './components/schemas/User.yaml'
    Video:
      $ref: './components/schemas/Video.yaml'
    VideoStatus:
      $ref: './components/schemas/VideoStatus.yaml'
    TranscodeJob:
      $ref: './components/schemas/TranscodeJob.yaml'
    Comment:
      $ref: './components/schemas/Comment.yaml'
    ChatMessage:
      $ref: './components/schemas/ChatMessage.yaml'
    LiveStream:
      $ref: './components/schemas/LiveStream.yaml'
    StreamKey:
      $ref: './components/schemas/StreamKey.yaml'
    PlaybackSession:
      $ref: './components/schemas/PlaybackSession.yaml'
    PlaybackEvent:
      $ref: './components/schemas/PlaybackEvent.yaml'
    UploadInitRequest:
      $ref: './components/schemas/UploadInitRequest.yaml'
    UploadInitResponse:
      $ref: './components/schemas/UploadInitResponse.yaml'
    UploadProgress:
      $ref: './components/schemas/UploadProgress.yaml'
  parameters:
    PageParam:
      $ref: './components/parameters/PageParam.yaml'
    LimitParam:
      $ref: './components/parameters/LimitParam.yaml'

paths:
  /health:
    $ref: './paths/api/v1/health/liveness.yaml'
  /health/ready:
    $ref: './paths/api/v1/health/readiness.yaml'

  /api/v1/me:
    $ref: './paths/api/v1/auth/me.yaml'
  /auth/logout:
    $ref: './paths/api/v1/auth/logout.yaml'

  /api/v1/videos:
    $ref: './paths/api/v1/videos/list.yaml'
  /api/v1/videos/{id}:
    get:
      $ref: './paths/api/v1/videos/get.yaml#/get'
    delete:
      $ref: './paths/api/v1/videos/delete.yaml#/delete'
    patch:
      $ref: './paths/api/v1/videos/update.yaml#/patch'
  /api/v1/videos/{id}/status:
    $ref: './paths/api/v1/videos/status.yaml'
  /api/v1/videos/{id}/sessions:
    $ref: './paths/api/v1/videos/create-session.yaml'

  /api/v1/uploads:
    $ref: './paths/api/v1/uploads/init.yaml'
  /api/v1/uploads/{upload_id}/thumbnail:
    $ref: './paths/api/v1/uploads/thumbnail.yaml'
  /api/v1/uploads/{upload_id}/chunks/{chunk_number}:
    $ref: './paths/api/v1/uploads/chunk.yaml'
  /api/v1/uploads/{upload_id}/status:
    $ref: './paths/api/v1/uploads/status.yaml'

  /api/v1/videos/{video_id}/comments:
    get:
      $ref: './paths/api/v1/comments/list.yaml#/get'
    post:
      $ref: './paths/api/v1/comments/add.yaml#/post'
  /api/v1/videos/{video_id}/comments/{comment_id}:
    $ref: './paths/api/v1/comments/delete.yaml'

  /api/v1/live:
    $ref: './paths/api/v1/live/list.yaml'
  /api/v1/live/{stream_id}:
    $ref: './paths/api/v1/live/get.yaml'
  /api/v1/live/{stream_id}/viewers:
    $ref: './paths/api/v1/live/viewers.yaml'
  /api/v1/live/{stream_id}/sessions:
    $ref: './paths/api/v1/live/create-session.yaml'
  /api/v1/live/{stream_id}/end:
    $ref: './paths/api/v1/live/end.yaml'

  /api/v1/live/{stream_id}/chat:
    get:
      $ref: './paths/api/v1/chat/list.yaml#/get'
    post:
      $ref: './paths/api/v1/chat/send.yaml#/post'
  /api/v1/live/{stream_id}/chat/stream:
    $ref: './paths/api/v1/chat/stream.yaml'

  /api/v1/stream-keys:
    get:
      $ref: './paths/api/v1/stream-keys/list.yaml#/get'
    post:
      $ref: './paths/api/v1/stream-keys/create.yaml#/post'
  /api/v1/stream-keys/{id}:
    delete:
      $ref: './paths/api/v1/stream-keys/deactivate.yaml#/delete'
    patch:
      $ref: './paths/api/v1/stream-keys/update.yaml#/patch'

  /api/v1/sessions/{session_id}/events:
    $ref: './paths/api/v1/telemetry/events.yaml'
