<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MarpTube — Library</title>
<script>(function(){var t=localStorage.getItem('theme')||'light';document.documentElement.setAttribute('data-theme',t)})();</script>
<style>
:root {
  --bg: #f7f7f5; --surface: #ffffff; --surface2: #f1f1ee;
  --border: #e6e6e1; --border2: #d0d0cb;
  --text: #18181b; --text-2: #52525b; --text-3: #a1a1aa;
  --link: #2563eb; --link-dim: #1d4ed8;
  --green: #16a34a; --red: #dc2626;
  --card-hover-border: #b8b8b2;
  --progress-track: #e6e6e1; --progress-fill: #8b5cf6;
  --thumb-bg: #ececea;
  --badge-upload-bg: #dbeafe; --badge-upload-text: #1d4ed8;
  --badge-proc-bg: #f3e8ff; --badge-proc-text: #7e22ce;
  --badge-ready-bg: #dcfce7; --badge-ready-text: #15803d;
  --badge-fail-bg: #fee2e2; --badge-fail-text: #b91c1c;
  --live-thumb-bg: #fee2e2; --live-thumb-text: #dc2626;
  --section-label: #888;
}
[data-theme="dark"] {
  --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #111;
  --border: #2a2a2a; --border2: #3a3a3a;
  --text: #e4e4e7; --text-2: #a1a1aa; --text-3: #52525b;
  --link: #60a5fa; --link-dim: #93c5fd;
  --green: #4ade80; --red: #f87171;
  --card-hover-border: #555;
  --progress-track: #2a2a2a; --progress-fill: #8b5cf6;
  --thumb-bg: #111;
  --badge-upload-bg: #1e3a5f; --badge-upload-text: #60a5fa;
  --badge-proc-bg: #2d1b4e; --badge-proc-text: #c084fc;
  --badge-ready-bg: #14352a; --badge-ready-text: #4ade80;
  --badge-fail-bg: #3b1a1a; --badge-fail-text: #f87171;
  --live-thumb-bg: #1a0a0a; --live-thumb-text: #dc2626;
  --section-label: #555;
}
* { boMarpTuberder-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; min-height: 100vh; }
header { background: var(--surface); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
header h1 { font-size: 1.25rem; font-weight: 600; letter-spacing: -0.02em; }
.header-actions { display: flex; gap: 0.75rem; align-items: center; }
.header-actions a { background: var(--link); color: #fff; padding: 0.5rem 1.25rem; border-radius: 6px; text-decoration: none; font-size: 0.875rem; font-weight: 500; }
.header-actions a:hover { background: var(--link-dim); }
#theme-toggle { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-2); flex-shrink: 0; padding: 0; }
#theme-toggle:hover { background: var(--border2); }
main { padding: 2rem; max-width: 1400px; margin: 0 auto; }
.section-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--section-label); margin-bottom: 1rem; }
#grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s; }
.card:hover { transform: translateY(-2px); border-color: var(--card-hover-border); box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
[data-theme="dark"] .card:hover { box-shadow: none; }
.card a { text-decoration: none; color: inherit; display: block; }
.thumb { background: var(--thumb-bg); aspect-ratio: 16/9; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }
.live-thumb { background: var(--live-thumb-bg); color: var(--live-thumb-text); font-size: 1.5rem; }
.card-body { padding: 0.875rem 1rem; }
.card-title { font-size: 0.9rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 0.4rem; color: var(--text); }
.card-meta { font-size: 0.72rem; color: var(--text-3); margin-top: 0.35rem; }
.badge { display: inline-flex; align-items: center; gap: 0.3rem; padding: 0.2rem 0.6rem; border-radius: 999px; font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
.badge-uploading { background: var(--badge-upload-bg); color: var(--badge-upload-text); }
.badge-processing { background: var(--badge-proc-bg); color: var(--badge-proc-text); }
.badge-ready { background: var(--badge-ready-bg); color: var(--badge-ready-text); }
.badge-failed { background: var(--badge-fail-bg); color: var(--badge-fail-text); }
.badge-live { background: #dc2626; color: #fff; animation: live-pulse 2s infinite; }
@keyframes live-pulse { 0%,100%{opacity:1} 50%{opacity:0.7} }
.progress-bar { height: 3px; background: var(--progress-track); border-radius: 999px; margin-top: 0.5rem; }
.progress-fill { height: 100%; background: var(--progress-fill); border-radius: 999px; transition: width 0.5s; }
#empty { display: none; text-align: center; padding: 4rem 2rem; color: var(--text-3); }
#empty h2 { font-size: 1.25rem; margin-bottom: 0.5rem; color: var(--text-2); }
#empty p { font-size: 0.875rem; }
#empty a { color: var(--link); }
</style>
</head>
<body>
<header>
  <h1>Philos Video</h1>
  <div class="header-actions">
    <button id="theme-toggle" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle theme"></button>
    <a href="/go-live" style="background:#dc2626;">&#9679; Go Live</a>
    <a href="/upload">+ Upload</a>
  </div>
</header>
<main>
  <div id="live-section" style="display:none;margin-bottom:2rem;">
    <div class="section-label">Live Now</div>
    <div id="live-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.5rem;"></div>
  </div>
  <div id="grid"></div>
  <div id="empty">
    <h2>No videos yet</h2>
    <p><a href="/upload">Upload your first video</a> to get started.</p>
  </div>
</main>
<script>
const ICONS = { uploading: '⬆️', processing: '⚙️', ready: '▶️', failed: '❌' };

function statusBadge(status) {
  return `<span class="badge badge-${status}">${ICONS[status] || ''} ${status}</span>`;
}

function progressBar(status, progress) {
  if (status === 'ready' || status === 'uploading') return '';
  const pct = Math.round((progress || 0) * 100);
  return `<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>`;
}

function renderCard(v) {
  const href = v.status === 'ready' ? `/watch/${v.id}` : '#';
  return `
    <div class="card" data-id="${v.id}">
      <a href="${href}">
        <div class="thumb">${v.status === 'ready' ? '▶' : ICONS[v.status] || '📄'}</div>
        <div class="card-body">
          <div class="card-title">${escHtml(v.title)}</div>
          ${statusBadge(v.status)}
          ${progressBar(v.status, v._progress)}
          ${v.status === 'ready' ? `<div class="card-meta">▶ ${v.play_count || 0} play${v.play_count !== 1 ? 's' : ''}</div>` : ''}
        </div>
      </a>
    </div>`;
}

function escHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let prevStatuses = {};

async function refresh() {
  try {
    const res = await fetch('/api/v1/videos');
    if (!res.ok) return;
    const videos = await res.json();

    await Promise.all(videos.map(async v => {
      if (v.status === 'processing') {
        try {
          const sr = await fetch(`/api/v1/videos/${v.id}/status`);
          if (sr.ok) { const s = await sr.json(); v._progress = s.progress; }
        } catch {}
      }
    }));

    const grid = document.getElementById('grid');
    const empty = document.getElementById('empty');

    if (!videos || videos.length === 0) {
      grid.innerHTML = '';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    const ids = new Set(videos.map(v => v.id));
    grid.querySelectorAll('.card').forEach(el => { if (!ids.has(el.dataset.id)) el.remove(); });

    videos.forEach(v => {
      const existing = grid.querySelector(`.card[data-id="${v.id}"]`);
      const html = renderCard(v);
      if (existing) {
        if (prevStatuses[v.id] !== v.status || v.status === 'processing') existing.outerHTML = html;
      } else {
        grid.insertAdjacentHTML('afterbegin', html);
      }
      prevStatuses[v.id] = v.status;
    });
  } catch (e) { console.error('refresh error', e); }
}

refresh();
setInterval(refresh, 3000);

async function refreshLive() {
  try {
    const res = await fetch('/api/v1/live');
    if (!res.ok) return;
    const streams = await res.json();
    const section = document.getElementById('live-section');
    const grid = document.getElementById('live-grid');
    if (!streams || !streams.length) { section.style.display = 'none'; return; }
    section.style.display = 'block';
    grid.innerHTML = streams.map(s => `
      <div class="card">
        <a href="/watch-live/${escHtml(s.id)}">
          <div class="thumb live-thumb">&#9679; LIVE</div>
          <div class="card-body">
            <div class="card-title">${escHtml(s.title)}</div>
            <span class="badge badge-live">&#9679; LIVE</span>
          </div>
        </a>
      </div>`).join('');
  } catch {}
}

refreshLive();
setInterval(refreshLive, 5000);

const _MOON='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
const _SUN='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
function toggleTheme(){var h=document.documentElement,t=h.getAttribute('data-theme')==='dark'?'light':'dark';h.setAttribute('data-theme',t);localStorage.setItem('theme',t);_updateToggle();}
function _updateToggle(){var isDark=document.documentElement.getAttribute('data-theme')==='dark',btn=document.getElementById('theme-toggle');if(btn)btn.innerHTML=isDark?_SUN:_MOON;}
document.addEventListener('DOMContentLoaded',_updateToggle);
</script>
</body>
</html>
