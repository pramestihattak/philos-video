<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{.Title}} — Live — PramTube</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

:root {
  --bg: #ffffff;
  --bg-subtle: #f7f7f7;
  --text: #111111;
  --text-2: #555555;
  --text-3: #999999;
  --border: #e8e8e8;
  --border-hover: #c8c8c8;
  --pill-bg: #f0f0f0;
  --pill-hover: #e4e4e4;
  --accent: #5a67d8;
  --live: #dc2626;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: system-ui, -apple-system, sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Header ── */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.75rem 1.5rem;
  background: #ffffff;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
header a { color: var(--accent); text-decoration: none; font-size: 0.875rem; }
.title { font-size: 0.9rem; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.live-badge {
  background: var(--live);
  color: #fff;
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  padding: 0.2rem 0.5rem;
  border-radius: 3px;
  text-transform: uppercase;
  flex-shrink: 0;
}
#viewer-count {
  font-size: 0.82rem;
  color: var(--text-2);
  display: flex;
  align-items: center;
  gap: 0.3rem;
  flex-shrink: 0;
}
.header-right { margin-left: auto; display: flex; align-items: center; gap: 0.75rem; }
.header-dash { font-size: 0.78rem; color: var(--text-3); }

/* ── Two-column layout ── */
.content-wrap {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 320px;
  min-height: 0;
}
@media (max-width: 860px) {
  .content-wrap { grid-template-columns: 1fr; }
  .chat-sidebar { max-height: 380px; border-top: 1px solid var(--border); border-left: none !important; }
}

/* ── Player area ── */
#player-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 1.25rem;
  background: #111;
  position: relative;
  min-height: 0;
}
video {
  max-width: 100%;
  max-height: calc(100vh - 120px);
  width: 100%;
  background: #000;
  border-radius: 6px;
}
#overlay {
  position: absolute;
  top: 1rem;
  right: 1.5rem;
  background: rgba(0,0,0,0.7);
  color: #ccc;
  font-size: 0.72rem;
  padding: 0.5rem 0.75rem;
  border-radius: 6px;
  font-family: monospace;
  line-height: 1.7;
  pointer-events: none;
}
#controls {
  margin-top: 0.75rem;
  display: flex;
  align-items: center;
  gap: 0.75rem;
}
#controls label { font-size: 0.8rem; color: #888; }
#quality-select {
  background: #2a2a2a;
  color: #e0e0e0;
  border: 1px solid #444;
  border-radius: 4px;
  padding: 0.3rem 0.5rem;
  font-size: 0.8rem;
}
#loading {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 0.75rem;
  color: #888;
  font-size: 0.9rem;
}
.spinner {
  width: 36px;
  height: 36px;
  border: 3px solid #333;
  border-top-color: var(--live);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Chat sidebar ── */
.chat-sidebar {
  display: flex;
  flex-direction: column;
  border-left: 1px solid var(--border);
  background: var(--bg-subtle);
  min-height: 0;
  max-height: calc(100vh - 57px); /* header height */
  position: sticky;
  top: 57px;
}
.chat-header {
  padding: 0.75rem 1rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  background: var(--bg);
}
.chat-title {
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--text);
}
.chat-online {
  font-size: 0.7rem;
  color: var(--text-3);
}

/* Messages */
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 0.5rem 0;
  display: flex;
  flex-direction: column;
  gap: 0;
}
.chat-msg {
  display: flex;
  gap: 0.5rem;
  padding: 0.4rem 0.85rem;
}
.chat-msg:hover { background: var(--bg); }
.chat-avatar {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  object-fit: cover;
  flex-shrink: 0;
  background: var(--border);
}
.chat-avatar-placeholder {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: var(--pill-bg);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 0.62rem;
  font-weight: 600;
  color: var(--text-2);
}
.chat-msg-body { flex: 1; min-width: 0; }
.chat-msg-author {
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 0.1rem;
}
.chat-msg-text {
  font-size: 0.78rem;
  color: var(--text-2);
  line-height: 1.45;
  word-break: break-word;
  white-space: pre-wrap;
}
.chat-empty {
  padding: 2rem 1rem;
  text-align: center;
  font-size: 0.78rem;
  color: var(--text-3);
}

/* Chat form */
.chat-form {
  padding: 0.65rem 0.85rem;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 0.5rem;
  align-items: flex-end;
  background: var(--bg);
  flex-shrink: 0;
}
.chat-form input {
  flex: 1;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 0.45rem 0.65rem;
  font-size: 0.8rem;
  font-family: inherit;
  background: var(--bg-subtle);
  color: var(--text);
  outline: none;
  transition: border-color 0.12s;
}
.chat-form input:focus { border-color: var(--border-hover); }
.chat-form input::placeholder { color: var(--text-3); }
.chat-send {
  background: #111;
  color: #fff;
  border: none;
  border-radius: 6px;
  padding: 0.45rem 0.75rem;
  font-size: 0.78rem;
  font-weight: 500;
  cursor: pointer;
  flex-shrink: 0;
  transition: opacity 0.12s;
}
.chat-send:hover { opacity: 0.8; }
.chat-send:disabled { opacity: 0.4; cursor: default; }
.chat-login-prompt {
  padding: 0.65rem 0.85rem;
  border-top: 1px solid var(--border);
  font-size: 0.75rem;
  color: var(--text-3);
  background: var(--bg);
  flex-shrink: 0;
}
.chat-login-prompt a { color: var(--accent); text-decoration: none; }
.chat-login-prompt a:hover { text-decoration: underline; }
</style>
</head>
<body>

<header>
  <a href="/">← Library</a>
  <span class="title">{{.Title}}</span>
  <span class="live-badge">LIVE</span>
  <span id="viewer-count" style="display:none;">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
    <span id="viewer-num">0</span>
  </span>
  <div class="header-right">
    <a href="/dashboard" class="header-dash">Dashboard</a>
  </div>
</header>

<div class="content-wrap">
  <!-- Player -->
  <div id="player-wrap">
    <div id="loading"><div class="spinner"></div><span>Connecting to live stream…</span></div>
    <video id="video" controls playsinline style="display:none;"></video>
    <div id="overlay" style="display:none;">
      <div>Quality: <span id="ov-quality">—</span></div>
      <div>Bandwidth: <span id="ov-bw">—</span></div>
      <div>Buffer: <span id="ov-buf">—</span>s</div>
      <div>Latency: ~<span id="ov-latency">—</span>s</div>
    </div>
    <div id="controls" style="display:none;">
      <label for="quality-select">Quality:</label>
      <select id="quality-select"><option value="-1">Auto</option></select>
    </div>
  </div>

  <!-- Chat -->
  <div class="chat-sidebar">
    <div class="chat-header">
      <span class="chat-title">Live Chat</span>
      <span class="chat-online" id="chat-online"></span>
    </div>

    <div class="chat-messages" id="chat-messages">
      <div class="chat-empty" id="chat-empty">Chat will appear here.</div>
    </div>

    {{if .User}}
    <div class="chat-form">
      <input id="chat-input" type="text" placeholder="Say something… 😊" maxlength="500" autocomplete="off">
      <button class="chat-send" id="chat-send" onclick="sendChatMessage()">Send</button>
    </div>
    {{else}}
    <div class="chat-login-prompt">
      <a href="/auth/google/login?return=/watch-live/{{.StreamID}}">Sign in</a> to chat.
    </div>
    {{end}}
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
<script>
const STREAM_ID = "{{.StreamID}}";

const video = document.getElementById('video');
const loading = document.getElementById('loading');
const overlay = document.getElementById('overlay');
const controls = document.getElementById('controls');
const qualitySelect = document.getElementById('quality-select');

/* ── HLS player ── */
async function initPlayer() {
  let session;
  try {
    const res = await fetch(`/api/v1/live/${STREAM_ID}/sessions`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ device_type: /Mobi|Android/i.test(navigator.userAgent) ? 'mobile' : 'desktop' }),
    });
    if (!res.ok) throw new Error(await res.text() || res.statusText);
    session = await res.json();
  } catch (e) {
    loading.textContent = '';
    const errSpan = document.createElement('span');
    errSpan.style.color = '#f87171';
    errSpan.textContent = 'Failed to start session: ' + e.message;
    loading.appendChild(errSpan);
    return;
  }

  const TOKEN = session.token;
  const MANIFEST = session.manifest_url;

  if (!Hls.isSupported()) {
    loading.style.display = 'none';
    video.style.display = 'block';
    video.src = MANIFEST;
    video.play().catch(() => {});
    return;
  }

  const hls = new Hls({
    liveSyncDurationCount: 3,
    liveMaxLatencyDurationCount: 5,
    xhrSetup: function(xhr, url) {
      const sep = url.includes('?') ? '&' : '?';
      xhr.open('GET', url + sep + 'token=' + TOKEN, true);
    },
  });

  hls.on(Hls.Events.MANIFEST_PARSED, (_, data) => {
    data.levels.forEach((lvl, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = `${lvl.height}p (${Math.round(lvl.bitrate / 1000)}k)`;
      qualitySelect.appendChild(opt);
    });
    loading.style.display = 'none';
    video.style.display = 'block';
    overlay.style.display = 'block';
    controls.style.display = 'flex';
    video.play().catch(() => {});
  });

  hls.on(Hls.Events.LEVEL_SWITCHED, (_, data) => {
    const lvl = hls.levels[data.level];
    document.getElementById('ov-quality').textContent = lvl ? `${lvl.height}p` : '—';
    document.getElementById('ov-bw').textContent = lvl ? `${Math.round(lvl.bitrate / 1000)}kbps` : '—';
  });

  setInterval(() => {
    if (!video.buffered.length) return;
    const bufLen = Math.max(0, video.buffered.end(video.buffered.length - 1) - video.currentTime);
    document.getElementById('ov-buf').textContent = bufLen.toFixed(1);
    if (hls.liveSyncPosition) {
      document.getElementById('ov-latency').textContent = Math.max(0, hls.liveSyncPosition - video.currentTime).toFixed(1);
    }
  }, 2000);

  qualitySelect.addEventListener('change', () => { hls.currentLevel = parseInt(qualitySelect.value, 10); });
  hls.loadSource(MANIFEST);
  hls.attachMedia(video);
}

initPlayer();

/* ── Viewer count ── */
async function refreshViewers() {
  try {
    const res = await fetch(`/api/v1/live/${STREAM_ID}/viewers`);
    if (!res.ok) return;
    const data = await res.json();
    const el = document.getElementById('viewer-count');
    document.getElementById('viewer-num').textContent = data.viewers;
    el.style.display = 'flex';
    const onlineEl = document.getElementById('chat-online');
    if (onlineEl) onlineEl.textContent = data.viewers + ' watching';
  } catch {}
}
refreshViewers();
setInterval(refreshViewers, 10000);

/* ── Live Chat ── */
const chatMessages = document.getElementById('chat-messages');
const chatEmpty = document.getElementById('chat-empty');

let _atBottom = true;

chatMessages.addEventListener('scroll', () => {
  const threshold = 60;
  _atBottom = chatMessages.scrollHeight - chatMessages.scrollTop - chatMessages.clientHeight < threshold;
});

function scrollToBottom() {
  if (_atBottom) chatMessages.scrollTop = chatMessages.scrollHeight;
}

function chatAvatar(pic, name) {
  if (pic) {
    const img = document.createElement('img');
    img.className = 'chat-avatar';
    img.src = pic;
    img.alt = name;
    return img;
  }
  const el = document.createElement('div');
  el.className = 'chat-avatar-placeholder';
  el.textContent = (name || '?')[0].toUpperCase();
  return el;
}

const MAX_CHAT_MSGS = 500;

function appendChatMessage(msg) {
  chatEmpty.style.display = 'none';

  const item = document.createElement('div');
  item.className = 'chat-msg';
  item.appendChild(chatAvatar(msg.user_picture, msg.user_name));

  const body = document.createElement('div');
  body.className = 'chat-msg-body';

  const author = document.createElement('div');
  author.className = 'chat-msg-author';
  author.textContent = msg.user_name || 'Anonymous';

  const text = document.createElement('div');
  text.className = 'chat-msg-text';
  text.textContent = msg.body;

  body.appendChild(author);
  body.appendChild(text);
  item.appendChild(body);
  chatMessages.appendChild(item);

  // Cap DOM size: remove oldest messages beyond the limit (index 0 is chatEmpty placeholder).
  while (chatMessages.children.length > MAX_CHAT_MSGS + 1) {
    chatMessages.removeChild(chatMessages.children[1]);
  }

  scrollToBottom();
}

function connectChat() {
  const es = new EventSource(`/api/v1/live/${STREAM_ID}/chat/stream`);

  es.onmessage = (e) => {
    const data = JSON.parse(e.data);
    // First event is history batch
    if (data.history) {
      data.history.forEach(appendChatMessage);
      _atBottom = true;
      chatMessages.scrollTop = chatMessages.scrollHeight;
      return;
    }
    appendChatMessage(data);
  };

  es.onerror = () => {
    // EventSource will auto-reconnect; no action needed
  };

  window.addEventListener('beforeunload', () => es.close());
}

connectChat();

async function sendChatMessage() {
  const input = document.getElementById('chat-input');
  const btn = document.getElementById('chat-send');
  const body = input.value.trim();
  if (!body) return;

  btn.disabled = true;
  try {
    const res = await fetch(`/api/v1/live/${STREAM_ID}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ body }),
    });
    if (res.ok) {
      input.value = '';
    }
  } finally {
    btn.disabled = false;
    input.focus();
  }
}

document.getElementById('chat-input')?.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendChatMessage();
  }
});
</script>
</body>
</html>
