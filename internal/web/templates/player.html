<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{.Title}} — PramTube</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

:root {
  --bg: #ffffff;
  --bg-subtle: #f7f7f7;
  --text: #111111;
  --text-2: #555555;
  --text-3: #999999;
  --border: #e8e8e8;
  --border-hover: #c8c8c8;
  --pill-bg: #f0f0f0;
  --pill-hover: #e4e4e4;
  --pill-active-bg: #111111;
  --pill-active-text: #ffffff;
  --accent: #5a67d8;
  --danger: #dc2626;
  --shadow-video: 0 4px 24px rgba(0,0,0,0.10), 0 1px 4px rgba(0,0,0,0.06);
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: system-ui, -apple-system, sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Header ── */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.75rem 1.5rem;
  background: #ffffff;
  border-bottom: 1px solid var(--border);
}
.header-back {
  display: flex;
  align-items: center;
  gap: 0.3rem;
  color: var(--text-2);
  text-decoration: none;
  font-size: 0.8rem;
  font-weight: 500;
  padding: 0.3rem 0.6rem;
  border-radius: 6px;
  transition: background 0.12s, color 0.12s;
}
.header-back:hover { background: var(--pill-hover); color: var(--text); }
.header-logo {
  font-size: 0.9rem;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.03em;
}
.header-right { margin-left: auto; display: flex; align-items: center; gap: 0.5rem; }
.header-dash-link {
  font-size: 0.78rem;
  color: var(--text-3);
  text-decoration: none;
  padding: 0.3rem 0.6rem;
  border-radius: 6px;
  transition: background 0.12s, color 0.12s;
}
.header-dash-link:hover { background: var(--pill-hover); color: var(--text-2); }

/* ── Two-column layout ── */
.page-content {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 340px;
  gap: 1.25rem;
  max-width: 1400px;
  width: 100%;
  margin: 0 auto;
  padding: 1.5rem 1.5rem 3rem;
  align-items: start;
}
@media (max-width: 920px) {
  .page-content {
    grid-template-columns: 1fr;
  }
  .sidebar {
    position: static !important;
    max-height: 420px !important;
  }
}

/* ── Main column ── */
.main-column {
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 0;
}

/* ── Video card ── */
.video-card {
  width: 100%;
  border-radius: 10px;
  overflow: hidden;
  background: #000;
  box-shadow: var(--shadow-video);
}
.video-aspect {
  position: relative;
  width: 100%;
  aspect-ratio: 16 / 9;
  background: #000;
}
video {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  display: block;
}

/* Loading */
#loading {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 1rem;
  background: #0a0a0a;
  z-index: 10;
}
.spinner-ring {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.1);
  border-top-color: rgba(255,255,255,0.6);
  animation: spin 0.75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loading-text { font-size: 0.75rem; color: rgba(255,255,255,0.3); letter-spacing: 0.04em; }

/* Stats overlay */
#stats-overlay {
  position: absolute;
  top: 0.75rem;
  right: 0.75rem;
  background: rgba(0,0,0,0.75);
  color: rgba(255,255,255,0.5);
  font-size: 0.67rem;
  font-family: 'SF Mono', 'Fira Code', ui-monospace, monospace;
  padding: 0.65rem 0.85rem;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.08);
  line-height: 1.9;
  pointer-events: none;
  display: none;
  min-width: 172px;
  z-index: 20;
}
#stats-overlay.visible { display: block; }
.stat-row { display: flex; justify-content: space-between; gap: 1.5rem; }
.stat-label { color: rgba(255,255,255,0.28); }
.stat-value { color: rgba(255,255,255,0.7); text-align: right; }
#ov-sess { color: rgba(255,255,255,0.18); font-size: 0.57rem; margin-top: 0.3rem; word-break: break-all; }

/* ── Info section ── */
.info-section {
  padding: 1rem 0.1rem 0;
}
.video-title-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 1rem;
  margin-bottom: 0.75rem;
}
.video-title {
  font-size: 1.05rem;
  font-weight: 600;
  line-height: 1.45;
  letter-spacing: -0.02em;
  color: var(--text);
}
.play-count {
  font-size: 0.72rem;
  color: var(--text-3);
  white-space: nowrap;
  padding-top: 0.2rem;
}
.divider {
  height: 1px;
  background: var(--border);
  margin-bottom: 0.75rem;
}
.controls-bar {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  flex-wrap: wrap;
}
.controls-label {
  font-size: 0.7rem;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 500;
  flex-shrink: 0;
}
.quality-pills { display: flex; gap: 0.3rem; flex-wrap: wrap; }
.q-pill {
  background: var(--pill-bg);
  color: var(--text-2);
  border: none;
  border-radius: 6px;
  padding: 0.25rem 0.65rem;
  font-size: 0.75rem;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.1s, color 0.1s;
}
.q-pill:hover { background: var(--pill-hover); color: var(--text); }
.q-pill.active { background: var(--pill-active-bg); color: var(--pill-active-text); }
.stats-btn {
  margin-left: auto;
  background: var(--pill-bg);
  color: var(--text-3);
  border: none;
  border-radius: 6px;
  padding: 0.25rem 0.65rem;
  font-size: 0.75rem;
  font-weight: 500;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 0.4rem;
  transition: background 0.1s, color 0.1s;
}
.stats-btn:hover { background: var(--pill-hover); color: var(--text-2); }
.stats-btn.active { color: var(--accent); }
.stats-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); opacity: 0; transition: opacity 0.2s; }
.stats-btn.active .stats-dot { opacity: 1; }

/* ── Comments sidebar ── */
.sidebar {
  position: sticky;
  top: calc(56px + 1rem);
  max-height: calc(100vh - 80px);
  display: flex;
  flex-direction: column;
  background: var(--bg-subtle);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}
.sidebar-header {
  padding: 0.85rem 1rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.sidebar-title {
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--text);
}
.comment-count {
  font-size: 0.72rem;
  color: var(--text-3);
}

/* Comment form */
.comment-form {
  padding: 0.75rem 1rem;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.comment-form textarea {
  width: 100%;
  resize: none;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 0.5rem 0.65rem;
  font-size: 0.8rem;
  font-family: inherit;
  line-height: 1.5;
  background: var(--bg);
  color: var(--text);
  outline: none;
  transition: border-color 0.12s;
}
.comment-form textarea:focus { border-color: var(--border-hover); }
.comment-form textarea::placeholder { color: var(--text-3); }
.comment-form-footer {
  display: flex;
  justify-content: flex-end;
  margin-top: 0.5rem;
}
.btn-submit {
  background: var(--pill-active-bg);
  color: var(--pill-active-text);
  border: none;
  border-radius: 6px;
  padding: 0.3rem 0.85rem;
  font-size: 0.78rem;
  font-weight: 500;
  cursor: pointer;
  transition: opacity 0.12s;
}
.btn-submit:hover { opacity: 0.85; }
.btn-submit:disabled { opacity: 0.4; cursor: default; }

/* Login prompt */
.login-prompt {
  padding: 0.75rem 1rem;
  border-bottom: 1px solid var(--border);
  font-size: 0.78rem;
  color: var(--text-3);
  flex-shrink: 0;
}
.login-prompt a { color: var(--accent); text-decoration: none; }
.login-prompt a:hover { text-decoration: underline; }

/* Comments list */
.comments-list {
  flex: 1;
  overflow-y: auto;
  padding: 0.5rem 0;
}
.comment-item {
  display: flex;
  gap: 0.6rem;
  padding: 0.6rem 1rem;
  position: relative;
}
.comment-item:hover { background: var(--bg); }
.comment-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  object-fit: cover;
  flex-shrink: 0;
  background: var(--border);
}
.comment-avatar-placeholder {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--pill-bg);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--text-2);
}
.comment-body-wrap { flex: 1; min-width: 0; }
.comment-meta {
  display: flex;
  align-items: baseline;
  gap: 0.4rem;
  margin-bottom: 0.15rem;
}
.comment-author {
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--text);
}
.comment-time {
  font-size: 0.68rem;
  color: var(--text-3);
}
.comment-text {
  font-size: 0.8rem;
  color: var(--text-2);
  line-height: 1.5;
  word-break: break-word;
  white-space: pre-wrap;
}
.comment-delete {
  position: absolute;
  top: 0.5rem;
  right: 0.75rem;
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text-3);
  font-size: 0.72rem;
  padding: 0.2rem 0.3rem;
  border-radius: 4px;
  opacity: 0;
  transition: opacity 0.12s, color 0.12s, background 0.12s;
}
.comment-item:hover .comment-delete { opacity: 1; }
.comment-delete:hover { color: var(--danger); background: rgba(220,38,38,0.08); }
.comments-empty {
  padding: 2rem 1rem;
  text-align: center;
  font-size: 0.78rem;
  color: var(--text-3);
}
</style>
</head>
<body>

<header>
  <a href="/" class="header-back">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Library
  </a>
  <span class="header-logo">PramTube</span>
  <div class="header-right">
    <a href="/dashboard" class="header-dash-link">Dashboard</a>
  </div>
</header>

<div class="page-content">
  <!-- Main: video + info -->
  <div class="main-column">
    <div class="video-card">
      <div class="video-aspect">
        <div id="loading">
          <div class="spinner-ring"></div>
          <span id="loading-text">Initializing player…</span>
        </div>
        <video id="video" controls playsinline style="opacity:0;transition:opacity 0.3s;"></video>
        <div id="stats-overlay">
          <div class="stat-row"><span class="stat-label">Quality</span><span class="stat-value" id="ov-quality">—</span></div>
          <div class="stat-row"><span class="stat-label">Bandwidth</span><span class="stat-value" id="ov-bw">—</span></div>
          <div class="stat-row"><span class="stat-label">Buffer</span><span class="stat-value"><span id="ov-buf">—</span>s</span></div>
          <div class="stat-row"><span class="stat-label">Seg dl</span><span class="stat-value"><span id="ov-seg">—</span>ms</span></div>
          <div id="ov-sess"></div>
        </div>
      </div>
    </div>

    <div class="info-section">
      <div class="video-title-row">
        <h1 class="video-title">{{.Title}}</h1>
        <span class="play-count">{{.PlayCount}} plays</span>
      </div>
      <div class="divider"></div>
      <div class="controls-bar" id="controls-bar" style="display:none;">
        <span class="controls-label">Quality</span>
        <div class="quality-pills" id="quality-pills">
          <button class="q-pill active" data-level="-1">Auto</button>
        </div>
        <button class="stats-btn" id="stats-btn" onclick="toggleStats()">
          <span class="stats-dot"></span>
          Stats
        </button>
      </div>
    </div>
  </div>

  <!-- Sidebar: comments -->
  <div class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">Comments</span>
      <span class="comment-count" id="comment-count"></span>
    </div>

    {{if .User}}
    <div class="comment-form">
      <textarea id="comment-input" rows="2" placeholder="Add a comment… (emoji OK 😊)" maxlength="2000"></textarea>
      <div class="comment-form-footer">
        <button class="btn-submit" id="comment-submit" onclick="submitComment()">Post</button>
      </div>
    </div>
    {{else}}
    <div class="login-prompt">
      <a href="/auth/google/login?return=/watch/{{.VideoID}}">Sign in</a> to leave a comment.
    </div>
    {{end}}

    <div class="comments-list" id="comments-list">
      <div class="comments-empty" id="comments-empty" style="display:none;">No comments yet.</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
<script>
const VIDEO_ID = "{{.VideoID}}";
const CURRENT_USER_ID = "{{if .User}}{{.User.ID}}{{end}}";

/* ── Telemetry ── */
class TelemetryClient {
  constructor(sessionId, telemetryUrl) {
    this.sessionId = sessionId;
    this.telemetryUrl = telemetryUrl;
    this.eventBuffer = [];
    this._started = false;
    this._rebuffering = false;
    this._rebufferStartTime = null;
    this.playbackStartTime = null;
    this._levels = [];
    this.flushInterval = setInterval(() => this.flush(), 3000);
  }
  setLevels(levels) { this._levels = levels; }
  getQualityLabel(level) {
    if (level < 0 || level >= this._levels.length) return 'auto';
    const lvl = this._levels[level];
    return lvl ? lvl.height + 'p' : 'auto';
  }
  getBufferLength(video) {
    if (!video.buffered.length) return 0;
    return Math.max(0, video.buffered.end(video.buffered.length - 1) - video.currentTime);
  }
  recordPlayRequested() { this.playbackStartTime = performance.now(); }
  recordPlaybackStart(bufferLength) {
    const ttfm = this.playbackStartTime ? Math.round(performance.now() - this.playbackStartTime) : null;
    this.push({ event_type: 'playback_start', buffer_length: bufferLength, download_time_ms: ttfm });
  }
  recordSegmentDownloaded(data) {
    const stats = data.frag.stats;
    const dlTime = Math.round(stats.loading.end - stats.loading.start);
    const bytes = data.frag.loaded || 0;
    this.push({ event_type: 'segment_downloaded', segment_number: data.frag.sn,
      segment_quality: this.getQualityLabel(data.frag.level), segment_bytes: bytes,
      download_time_ms: dlTime, throughput_bps: dlTime > 0 ? Math.round(bytes * 8 / (dlTime / 1000)) : null });
  }
  recordQualityChange(fromLevel, toLevel) {
    this.push({ event_type: 'quality_change', quality_from: this.getQualityLabel(fromLevel), quality_to: this.getQualityLabel(toLevel) });
  }
  recordRebufferStart() { this._rebufferStartTime = performance.now(); this.push({ event_type: 'rebuffer_start' }); }
  recordRebufferEnd() {
    const duration = this._rebufferStartTime ? Math.round(performance.now() - this._rebufferStartTime) : 0;
    this.push({ event_type: 'rebuffer_end', rebuffer_duration_ms: duration });
    this._rebufferStartTime = null;
  }
  recordHeartbeat(video, hls) {
    this.push({ event_type: 'heartbeat', current_quality: this.getQualityLabel(hls.currentLevel),
      buffer_length: this.getBufferLength(video), playback_position: video.currentTime });
  }
  recordPlaybackEnd() { this.push({ event_type: 'playback_end' }); this.flush(); }
  push(event) { event.timestamp = new Date().toISOString(); this.eventBuffer.push(event); }
  async flush() {
    if (!this.eventBuffer.length) return;
    const events = this.eventBuffer.splice(0);
    try {
      await fetch(this.telemetryUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ events }) });
    } catch { this.eventBuffer.unshift(...events); }
  }
  destroy() { clearInterval(this.flushInterval); this.recordPlaybackEnd(); }
}

function detectDeviceType() {
  const ua = navigator.userAgent;
  if (/Mobi|Android/i.test(ua)) return 'mobile';
  if (/Tablet|iPad/i.test(ua)) return 'tablet';
  return 'desktop';
}

const video = document.getElementById('video');
const loading = document.getElementById('loading');
const statsOverlay = document.getElementById('stats-overlay');
const statsBtn = document.getElementById('stats-btn');
const controlsBar = document.getElementById('controls-bar');
const qualityPills = document.getElementById('quality-pills');

let _statsVisible = false;
function toggleStats() {
  _statsVisible = !_statsVisible;
  statsOverlay.classList.toggle('visible', _statsVisible);
  statsBtn.classList.toggle('active', _statsVisible);
}

function setActivePill(level) {
  qualityPills.querySelectorAll('.q-pill').forEach(p => {
    p.classList.toggle('active', parseInt(p.dataset.level, 10) === level);
  });
}

async function initPlayer() {
  let session;
  try {
    const res = await fetch(`/api/v1/videos/${VIDEO_ID}/sessions`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ device_type: detectDeviceType() }),
    });
    if (!res.ok) throw new Error(await res.text() || res.statusText);
    session = await res.json();
  } catch (e) {
    loading.innerHTML = '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="rgba(248,113,113,0.8)" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg><span style="color:rgba(248,113,113,0.8);font-size:0.8rem;">Session failed</span>';
    const errDetail = document.createElement('span');
    errDetail.style.cssText = 'color:rgba(255,255,255,0.2);font-size:0.68rem;max-width:260px;text-align:center;';
    errDetail.textContent = e.message;
    loading.appendChild(errDetail);
    return;
  }

  const TOKEN = session.token;
  const MANIFEST = session.manifest_url;
  document.getElementById('ov-sess').textContent = session.session_id;

  const telemetry = new TelemetryClient(session.session_id, session.telemetry_url);
  telemetry.recordPlayRequested();

  function showPlayer() {
    loading.style.display = 'none';
    video.style.opacity = '1';
    controlsBar.style.display = 'flex';
  }

  if (!Hls.isSupported()) {
    showPlayer();
    video.src = MANIFEST;
    video.play().catch(() => {});
    return;
  }

  const hls = new Hls({
    xhrSetup: function(xhr, url) {
      const sep = url.includes('?') ? '&' : '?';
      xhr.open('GET', url + sep + 'token=' + TOKEN, true);
    },
  });

  hls.on(Hls.Events.MANIFEST_PARSED, (_, data) => {
    telemetry.setLevels(data.levels);
    data.levels.forEach((lvl, i) => {
      const btn = document.createElement('button');
      btn.className = 'q-pill';
      btn.dataset.level = i;
      btn.textContent = `${lvl.height}p`;
      btn.title = `${Math.round(lvl.bitrate / 1000)}kbps`;
      btn.addEventListener('click', () => { hls.currentLevel = i; setActivePill(i); });
      qualityPills.appendChild(btn);
    });
    qualityPills.querySelector('[data-level="-1"]').addEventListener('click', () => { hls.currentLevel = -1; setActivePill(-1); });
    showPlayer();
    video.play().catch(() => {});
  });

  hls.on(Hls.Events.FRAG_LOADED, (_, data) => {
    telemetry.recordSegmentDownloaded(data);
    document.getElementById('ov-seg').textContent = Math.round(data.frag.stats.loading.end - data.frag.stats.loading.start);
  });

  hls.on(Hls.Events.LEVEL_SWITCHED, (_, data) => {
    const fromLevel = hls.previousLevel !== undefined ? hls.previousLevel : -1;
    telemetry.recordQualityChange(fromLevel, data.level);
    const lvl = hls.levels[data.level];
    document.getElementById('ov-quality').textContent = lvl ? `${lvl.height}p` : '—';
    document.getElementById('ov-bw').textContent = lvl ? `${Math.round(lvl.bitrate / 1000)}kbps` : '—';
    if (hls.autoLevelEnabled) setActivePill(-1); else setActivePill(data.level);
  });

  video.addEventListener('playing', () => {
    if (!telemetry._started) { telemetry.recordPlaybackStart(telemetry.getBufferLength(video)); telemetry._started = true; }
    if (telemetry._rebuffering) { telemetry.recordRebufferEnd(); telemetry._rebuffering = false; }
  });
  video.addEventListener('waiting', () => {
    if (telemetry._started && !telemetry._rebuffering) { telemetry.recordRebufferStart(); telemetry._rebuffering = true; }
  });
  video.addEventListener('ended', () => telemetry.recordPlaybackEnd());

  setInterval(() => {
    telemetry.recordHeartbeat(video, hls);
    document.getElementById('ov-buf').textContent = telemetry.getBufferLength(video).toFixed(1);
  }, 5000);

  window.addEventListener('beforeunload', () => telemetry.destroy());
  window.addEventListener('keydown', e => { if (e.key === 's' || e.key === 'S') toggleStats(); });

  hls.loadSource(MANIFEST);
  hls.attachMedia(video);
}

initPlayer();

/* ── Comments ── */
const commentsList = document.getElementById('comments-list');
const commentCount = document.getElementById('comment-count');
const commentsEmpty = document.getElementById('comments-empty');

function relativeTime(isoStr) {
  const diff = Math.floor((Date.now() - new Date(isoStr)) / 1000);
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  return Math.floor(diff / 86400) + 'd ago';
}

function avatarEl(pic, name) {
  if (pic) {
    const img = document.createElement('img');
    img.className = 'comment-avatar';
    img.src = pic;
    img.alt = name;
    return img;
  }
  const el = document.createElement('div');
  el.className = 'comment-avatar-placeholder';
  el.textContent = (name || '?')[0].toUpperCase();
  return el;
}

function buildCommentEl(c) {
  const item = document.createElement('div');
  item.className = 'comment-item';
  item.dataset.id = c.id;

  item.appendChild(avatarEl(c.user_picture, c.user_name));

  const bodyWrap = document.createElement('div');
  bodyWrap.className = 'comment-body-wrap';

  const meta = document.createElement('div');
  meta.className = 'comment-meta';
  const author = document.createElement('span');
  author.className = 'comment-author';
  author.textContent = c.user_name || 'Anonymous';
  const time = document.createElement('span');
  time.className = 'comment-time';
  time.textContent = relativeTime(c.created_at);
  meta.appendChild(author);
  meta.appendChild(time);

  const text = document.createElement('p');
  text.className = 'comment-text';
  text.textContent = c.body; // already escaped server-side

  bodyWrap.appendChild(meta);
  bodyWrap.appendChild(text);
  item.appendChild(bodyWrap);

  if (CURRENT_USER_ID && c.user_id === CURRENT_USER_ID) {
    const del = document.createElement('button');
    del.className = 'comment-delete';
    del.title = 'Delete';
    del.textContent = '×';
    del.onclick = () => deleteComment(c.id, item);
    item.appendChild(del);
  }

  return item;
}

let totalComments = 0;

async function loadComments() {
  try {
    const res = await fetch(`/api/v1/videos/${VIDEO_ID}/comments?limit=50`);
    if (!res.ok) return;
    const comments = await res.json();
    commentsList.innerHTML = '';
    commentsList.appendChild(commentsEmpty);
    totalComments = comments.length;
    updateCount();
    if (!comments.length) {
      commentsEmpty.style.display = 'block';
      return;
    }
    commentsEmpty.style.display = 'none';
    comments.forEach(c => commentsList.appendChild(buildCommentEl(c)));
  } catch {}
}

function updateCount() {
  commentCount.textContent = totalComments > 0 ? totalComments : '';
}

async function submitComment() {
  const input = document.getElementById('comment-input');
  const btn = document.getElementById('comment-submit');
  const body = input.value.trim();
  if (!body) return;

  btn.disabled = true;
  try {
    const res = await fetch(`/api/v1/videos/${VIDEO_ID}/comments`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ body }),
    });
    if (!res.ok) throw new Error(await res.text());
    const comment = await res.json();
    input.value = '';
    commentsEmpty.style.display = 'none';
    // Prepend (newest first)
    const el = buildCommentEl(comment);
    commentsList.insertBefore(el, commentsList.firstChild);
    totalComments++;
    updateCount();
  } catch (e) {
    alert('Failed to post comment: ' + e.message);
  } finally {
    btn.disabled = false;
  }
}

async function deleteComment(id, el) {
  if (!confirm('Delete this comment?')) return;
  try {
    const res = await fetch(`/api/v1/videos/${VIDEO_ID}/comments/${id}`, { method: 'DELETE' });
    if (!res.ok && res.status !== 204) throw new Error();
    el.remove();
    totalComments = Math.max(0, totalComments - 1);
    updateCount();
    if (!commentsList.querySelector('.comment-item')) {
      commentsEmpty.style.display = 'block';
    }
  } catch {
    alert('Failed to delete comment.');
  }
}

// Submit on Ctrl+Enter / Cmd+Enter
document.getElementById('comment-input')?.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') submitComment();
});

loadComments();
</script>

</html>
