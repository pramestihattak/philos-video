<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{.Title}} — PramTube</title>
<script>(function(){var t=localStorage.getItem('theme')||'light';document.documentElement.setAttribute('data-theme',t)})();</script>
<style>
:root {
  --bg: #f7f7f5; --surface: #ffffff; --surface2: #f1f1ee;
  --border: #e6e6e1; --border2: #d0d0cb;
  --text: #18181b; --text-2: #52525b; --text-3: #a1a1aa;
  --link: #2563eb; --link-dim: #1d4ed8;
  --player-bg: #111;
  --overlay-bg: rgba(0,0,0,0.78);
  --select-bg: #2a2a2a; --select-border: #444; --select-text: #e0e0e0;
}
[data-theme="dark"] {
  --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #111;
  --border: #2a2a2a; --border2: #3a3a3a;
  --text: #e4e4e7; --text-2: #a1a1aa; --text-3: #52525b;
  --link: #60a5fa; --link-dim: #93c5fd;
  --player-bg: #0a0a0a;
  --overlay-bg: rgba(0,0,0,0.75);
  --select-bg: #2a2a2a; --select-border: #444; --select-text: #e0e0e0;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; }
header { background: var(--surface); padding: 0.75rem 1.5rem; display: flex; align-items: center; gap: 0.75rem; border-bottom: 1px solid var(--border); flex-shrink: 0; }
header a { color: var(--link); text-decoration: none; font-size: 0.875rem; white-space: nowrap; }
header span.title { font-size: 0.9rem; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
header span.plays { font-size: 0.78rem; color: var(--text-3); flex-shrink: 0; }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 0.75rem; }
#theme-toggle { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-2); flex-shrink: 0; padding: 0; }
#theme-toggle:hover { background: var(--border2); }
#player-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1rem; position: relative; background: var(--player-bg); }
video { max-width: 100%; max-height: calc(100vh - 120px); width: 100%; background: #000; border-radius: 6px; }
#overlay { position: absolute; top: 60px; right: 1.5rem; background: var(--overlay-bg); color: #ccc; font-size: 0.72rem; padding: 0.5rem 0.75rem; border-radius: 6px; font-family: monospace; line-height: 1.7; pointer-events: none; }
#controls { margin-top: 0.75rem; display: flex; align-items: center; gap: 0.75rem; }
#controls label { font-size: 0.8rem; color: #888; }
#quality-select { background: var(--select-bg); color: var(--select-text); border: 1px solid var(--select-border); border-radius: 4px; padding: 0.3rem 0.5rem; font-size: 0.8rem; }
#loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 0.75rem; color: #888; font-size: 0.9rem; }
.spinner { width: 36px; height: 36px; border: 3px solid #333; border-top-color: #60a5fa; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<header>
  <a href="/">← Library</a>
  <span class="title">{{.Title}}</span>
  <span class="plays">▶ {{.PlayCount}} plays</span>
  <div class="header-right">
    <button id="theme-toggle" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle theme"></button>
    <a href="/dashboard" style="font-size:0.8rem;color:var(--text-3);">Dashboard</a>
  </div>
</header>
<div id="player-wrap">
  <div id="loading"><div class="spinner"></div><span>Initializing player…</span></div>
  <video id="video" controls playsinline style="display:none;"></video>
  <div id="overlay" style="display:none;">
    <div>Quality: <span id="ov-quality">—</span></div>
    <div>Bandwidth: <span id="ov-bw">—</span></div>
    <div>Buffer: <span id="ov-buf">—</span>s</div>
    <div>Seg dl: <span id="ov-seg">—</span>ms</div>
    <div>Session: <span id="ov-sess" style="color:#555;font-size:0.65rem;">—</span></div>
  </div>
  <div id="controls" style="display:none;">
    <label for="quality-select">Quality:</label>
    <select id="quality-select"><option value="-1">Auto</option></select>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
<script>
const VIDEO_ID = "{{.VideoID}}";

class TelemetryClient {
  constructor(sessionId, telemetryUrl) {
    this.sessionId = sessionId;
    this.telemetryUrl = telemetryUrl;
    this.eventBuffer = [];
    this._started = false;
    this._rebuffering = false;
    this._rebufferStartTime = null;
    this.playbackStartTime = null;
    this._levels = [];
    this.flushInterval = setInterval(() => this.flush(), 3000);
  }
  setLevels(levels) { this._levels = levels; }
  getQualityLabel(level) {
    if (level < 0 || level >= this._levels.length) return 'auto';
    const lvl = this._levels[level];
    return lvl ? lvl.height + 'p' : 'auto';
  }
  getBufferLength(video) {
    if (!video.buffered.length) return 0;
    return Math.max(0, video.buffered.end(video.buffered.length - 1) - video.currentTime);
  }
  recordPlayRequested() { this.playbackStartTime = performance.now(); }
  recordPlaybackStart(bufferLength) {
    const ttfm = this.playbackStartTime ? Math.round(performance.now() - this.playbackStartTime) : null;
    this.push({ event_type: 'playback_start', buffer_length: bufferLength, download_time_ms: ttfm });
  }
  recordSegmentDownloaded(data) {
    const stats = data.frag.stats;
    const dlTime = Math.round(stats.loading.end - stats.loading.start);
    const bytes = data.frag.loaded || 0;
    this.push({ event_type: 'segment_downloaded', segment_number: data.frag.sn,
      segment_quality: this.getQualityLabel(data.frag.level), segment_bytes: bytes,
      download_time_ms: dlTime, throughput_bps: dlTime > 0 ? Math.round(bytes * 8 / (dlTime / 1000)) : null });
  }
  recordQualityChange(fromLevel, toLevel) {
    this.push({ event_type: 'quality_change', quality_from: this.getQualityLabel(fromLevel), quality_to: this.getQualityLabel(toLevel) });
  }
  recordRebufferStart() { this._rebufferStartTime = performance.now(); this.push({ event_type: 'rebuffer_start' }); }
  recordRebufferEnd() {
    const duration = this._rebufferStartTime ? Math.round(performance.now() - this._rebufferStartTime) : 0;
    this.push({ event_type: 'rebuffer_end', rebuffer_duration_ms: duration });
    this._rebufferStartTime = null;
  }
  recordHeartbeat(video, hls) {
    this.push({ event_type: 'heartbeat', current_quality: this.getQualityLabel(hls.currentLevel),
      buffer_length: this.getBufferLength(video), playback_position: video.currentTime });
  }
  recordPlaybackEnd() { this.push({ event_type: 'playback_end' }); this.flush(); }
  push(event) { event.timestamp = new Date().toISOString(); this.eventBuffer.push(event); }
  async flush() {
    if (!this.eventBuffer.length) return;
    const events = this.eventBuffer.splice(0);
    try {
      await fetch(this.telemetryUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ events }) });
    } catch { this.eventBuffer.unshift(...events); }
  }
  destroy() { clearInterval(this.flushInterval); this.recordPlaybackEnd(); }
}

function detectDeviceType() {
  const ua = navigator.userAgent;
  if (/Mobi|Android/i.test(ua)) return 'mobile';
  if (/Tablet|iPad/i.test(ua)) return 'tablet';
  return 'desktop';
}

const video = document.getElementById('video');
const loading = document.getElementById('loading');
const overlay = document.getElementById('overlay');
const controls = document.getElementById('controls');
const qualitySelect = document.getElementById('quality-select');

async function initPlayer() {
  let session;
  try {
    const res = await fetch(`/api/v1/videos/${VIDEO_ID}/sessions`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ device_type: detectDeviceType() }),
    });
    if (!res.ok) throw new Error(await res.text() || res.statusText);
    session = await res.json();
  } catch (e) {
    loading.innerHTML = `<span style="color:#f87171">Failed to start session: ${e.message}</span>`;
    return;
  }

  const TOKEN = session.token;
  const MANIFEST = session.manifest_url;
  document.getElementById('ov-sess').textContent = session.session_id;

  const telemetry = new TelemetryClient(session.session_id, session.telemetry_url);
  telemetry.recordPlayRequested();

  if (!Hls.isSupported()) {
    loading.style.display = 'none';
    video.style.display = 'block';
    video.src = MANIFEST;
    video.play().catch(() => {});
    return;
  }

  const hls = new Hls({
    xhrSetup: function(xhr, url) {
      const sep = url.includes('?') ? '&' : '?';
      xhr.open('GET', url + sep + 'token=' + TOKEN, true);
    },
  });

  hls.on(Hls.Events.MANIFEST_PARSED, (_, data) => {
    telemetry.setLevels(data.levels);
    data.levels.forEach((lvl, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = `${lvl.height}p (${Math.round(lvl.bitrate / 1000)}k)`;
      qualitySelect.appendChild(opt);
    });
    loading.style.display = 'none';
    video.style.display = 'block';
    overlay.style.display = 'block';
    controls.style.display = 'flex';
    video.play().catch(() => {});
  });

  hls.on(Hls.Events.FRAG_LOADED, (_, data) => {
    telemetry.recordSegmentDownloaded(data);
    document.getElementById('ov-seg').textContent = Math.round(data.frag.stats.loading.end - data.frag.stats.loading.start);
  });

  hls.on(Hls.Events.LEVEL_SWITCHED, (_, data) => {
    const fromLevel = hls.previousLevel !== undefined ? hls.previousLevel : -1;
    telemetry.recordQualityChange(fromLevel, data.level);
    const lvl = hls.levels[data.level];
    document.getElementById('ov-quality').textContent = lvl ? `${lvl.height}p` : '—';
    document.getElementById('ov-bw').textContent = lvl ? `${Math.round(lvl.bitrate / 1000)}kbps` : '—';
  });

  video.addEventListener('playing', () => {
    if (!telemetry._started) { telemetry.recordPlaybackStart(telemetry.getBufferLength(video)); telemetry._started = true; }
    if (telemetry._rebuffering) { telemetry.recordRebufferEnd(); telemetry._rebuffering = false; }
  });
  video.addEventListener('waiting', () => {
    if (telemetry._started && !telemetry._rebuffering) { telemetry.recordRebufferStart(); telemetry._rebuffering = true; }
  });
  video.addEventListener('ended', () => telemetry.recordPlaybackEnd());

  setInterval(() => {
    telemetry.recordHeartbeat(video, hls);
    document.getElementById('ov-buf').textContent = telemetry.getBufferLength(video).toFixed(1);
  }, 5000);

  qualitySelect.addEventListener('change', () => { hls.currentLevel = parseInt(qualitySelect.value, 10); });
  window.addEventListener('beforeunload', () => telemetry.destroy());

  hls.loadSource(MANIFEST);
  hls.attachMedia(video);
}

initPlayer();

const _MOON='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
const _SUN='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
function toggleTheme(){var h=document.documentElement,t=h.getAttribute('data-theme')==='dark'?'light':'dark';h.setAttribute('data-theme',t);localStorage.setItem('theme',t);_updateToggle();}
function _updateToggle(){var isDark=document.documentElement.getAttribute('data-theme')==='dark',btn=document.getElementById('theme-toggle');if(btn)btn.innerHTML=isDark?_SUN:_MOON;}
document.addEventListener('DOMContentLoaded',_updateToggle);
</script>
</body>
</html>
