<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — PramTube</title>
<script>(function(){var t=localStorage.getItem('theme')||'light';document.documentElement.setAttribute('data-theme',t)})();</script>
<style>
:root {
  --bg: #f7f7f5; --surface: #ffffff; --surface2: #f1f1ee;
  --border: #e6e6e1; --text: #18181b; --text-2: #52525b; --text-3: #a1a1aa;
  --link: #2563eb;
}
[data-theme="dark"] {
  --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #111;
  --border: #2a2a2a; --text: #e4e4e7; --text-2: #a1a1aa; --text-3: #52525b;
  --link: #60a5fa;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 2.5rem 2rem; max-width: 360px; width: 100%; text-align: center; }
h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 0.4rem; }
p { font-size: 0.875rem; color: var(--text-2); margin-bottom: 1.75rem; }
.btn-google {
  display: inline-flex; align-items: center; gap: 0.6rem;
  background: #fff; color: #3c4043; border: 1px solid #dadce0;
  border-radius: 6px; padding: 0.65rem 1.4rem; font-size: 0.9rem;
  font-weight: 500; cursor: pointer; text-decoration: none;
  width: 100%; justify-content: center;
  transition: background 0.15s;
}
.btn-google:hover { background: #f8f8f8; }
[data-theme="dark"] .btn-google { background: #2a2a2a; color: #e4e4e7; border-color: #3a3a3a; }
[data-theme="dark"] .btn-google:hover { background: #333; }
.google-logo { width: 18px; height: 18px; flex-shrink: 0; }
</style>
</head>
<body>
<div class="card">
  <h1>PramTube</h1>
  <p>Sign in to manage your videos and streams.</p>
  <a class="btn-google" href="/auth/google/login{{if .ReturnURL}}?return={{.ReturnURL}}{{end}}">
    <svg class="google-logo" viewBox="0 0 48 48">
      <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
      <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
      <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
      <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
    </svg>
    Continue with Google
  </a>
</div>
</body>
</html>
