<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PramTube — Upload</title>
<script>(function(){var t=localStorage.getItem('theme')||'light';document.documentElement.setAttribute('data-theme',t)})();</script>
<style>
:root {
  --bg: #f7f7f5; --surface: #ffffff; --surface2: #f1f1ee;
  --border: #e6e6e1; --border2: #d0d0cb;
  --text: #18181b; --text-2: #52525b; --text-3: #a1a1aa;
  --link: #2563eb; --link-dim: #1d4ed8;
  --green: #16a34a;
  --drop-border: #c8c8c2; --drop-hover-border: #2563eb; --drop-hover-bg: #eff6ff;
  --progress-track: #e6e6e1;
  --result-bg: #f0fdf4; --result-border: #bbf7d0; --result-text: #15803d;
  --input-bg: #fff; --input-border: #d0d0cb;
  --thumb-preview-bg: #ececea;
}
[data-theme="dark"] {
  --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #111;
  --border: #2a2a2a; --border2: #3a3a3a;
  --text: #e4e4e7; --text-2: #a1a1aa; --text-3: #52525b;
  --link: #60a5fa; --link-dim: #93c5fd;
  --green: #4ade80;
  --drop-border: #444; --drop-hover-border: #60a5fa; --drop-hover-bg: #1a2a3a;
  --progress-track: #2a2a2a;
  --result-bg: #0a1a0a; --result-border: #1a3a1a; --result-text: #4ade80;
  --input-bg: #111; --input-border: #3a3a3a;
  --thumb-preview-bg: #111;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; min-height: 100vh; }
header { background: var(--surface); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
header h1 { font-size: 1.25rem; font-weight: 600; }
.header-right { display: flex; gap: 0.75rem; align-items: center; }
header a { color: var(--link); text-decoration: none; font-size: 0.875rem; }
#theme-toggle { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-2); flex-shrink: 0; padding: 0; }
#theme-toggle:hover { background: var(--border2); }
main { max-width: 640px; margin: 3rem auto; padding: 0 1.5rem 4rem; }
h2 { font-size: 1.4rem; font-weight: 600; margin-bottom: 1.75rem; }

/* ── Step 1: Drop zone ── */
#step-pick { }
#drop-zone {
  border: 2px dashed var(--drop-border); border-radius: 12px; padding: 3rem 2rem;
  text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s;
  background: var(--surface);
}
#drop-zone.drag-over { border-color: var(--drop-hover-border); background: var(--drop-hover-bg); }
#drop-zone input[type=file] { display: none; }
#drop-zone .icon { font-size: 3rem; margin-bottom: 1rem; }
#drop-zone p { color: var(--text-3); font-size: 0.9rem; margin-top: 0.5rem; }
#drop-zone .btn { display: inline-block; margin-top: 1rem; background: var(--link); color: #fff; padding: 0.6rem 1.5rem; border-radius: 6px; font-size: 0.875rem; font-weight: 500; cursor: pointer; border: none; }
#drop-zone .btn:hover { background: var(--link-dim); }
#file-selected { margin-top: 0.75rem; font-size: 0.85rem; color: var(--text-2); display: none; }

/* ── Step 2: Metadata form ── */
#step-meta { display: none; }
.field { margin-bottom: 1.25rem; }
.field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-2); margin-bottom: 0.4rem; }
.field input[type=text],
.field select {
  width: 100%; padding: 0.55rem 0.75rem; font-size: 0.9rem;
  border: 1px solid var(--input-border); border-radius: 7px;
  background: var(--input-bg); color: var(--text);
  outline: none; transition: border-color 0.15s;
}
.field input[type=text]:focus,
.field select:focus { border-color: var(--link); }
.field .hint { font-size: 0.75rem; color: var(--text-3); margin-top: 0.3rem; }

/* Thumbnail */
.thumb-row { display: flex; gap: 1rem; align-items: flex-start; }
.thumb-preview {
  width: 120px; height: 68px; border-radius: 6px; flex-shrink: 0;
  background: var(--thumb-preview-bg); border: 1px dashed var(--drop-border);
  display: flex; align-items: center; justify-content: center; overflow: hidden;
  cursor: pointer;
}
.thumb-preview img { width: 100%; height: 100%; object-fit: cover; display: none; }
.thumb-preview span { font-size: 1.75rem; }
.thumb-preview:hover { border-color: var(--link); }
#thumb-input { display: none; }
.thumb-meta { flex: 1; }
.thumb-name { font-size: 0.8rem; color: var(--text-2); margin-top: 0.3rem; }

/* Action row */
.action-row { display: flex; gap: 0.75rem; align-items: center; margin-top: 1.75rem; }
.btn-primary { background: var(--link); color: #fff; padding: 0.65rem 1.75rem; border-radius: 7px; font-size: 0.9rem; font-weight: 500; cursor: pointer; border: none; }
.btn-primary:hover { background: var(--link-dim); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-ghost { background: none; border: 1px solid var(--border2); color: var(--text-2); padding: 0.65rem 1.25rem; border-radius: 7px; font-size: 0.875rem; cursor: pointer; }
.btn-ghost:hover { border-color: var(--border); color: var(--text); }

/* ── Step 3: Progress ── */
#step-upload { display: none; }
#status-label { font-size: 0.9rem; color: var(--text-2); margin-bottom: 0.5rem; }
#progress-bar { height: 8px; background: var(--progress-track); border-radius: 999px; overflow: hidden; }
#progress-fill { height: 100%; background: var(--link); border-radius: 999px; width: 0%; transition: width 0.3s; }
#status-msg { margin-top: 0.75rem; font-size: 0.85rem; color: var(--text-3); }
#result { margin-top: 1.5rem; display: none; }
#result a { background: var(--result-bg); color: var(--result-text); border: 1px solid var(--result-border); padding: 0.75rem 1.5rem; border-radius: 8px; text-decoration: none; font-weight: 500; display: inline-block; }
#error-msg { margin-top: 1rem; color: #dc2626; font-size: 0.875rem; display: none; }
[data-theme="dark"] #error-msg { color: #f87171; }

/* Section divider label */
.section-header { font-size: 0.75rem; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 1rem; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.25rem; }
</style>
</head>
<body>
<header>
  <h1>PramTube</h1>
  <div class="header-right">
    <button id="theme-toggle" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle theme"></button>
    {{if .User}}<span style="font-size:0.8rem;color:var(--text-2);">{{.User.Email}}</span>{{end}}
    <a href="/">← Library</a>
    {{if .User}}<form method="POST" action="/auth/logout" style="display:inline;"><button type="submit" style="background:none;border:none;color:var(--link);font-size:0.875rem;cursor:pointer;padding:0;">Sign out</button></form>{{end}}
  </div>
</header>
<main>
  <h2>Upload Video</h2>

  <!-- Step 1: Pick file -->
  <div id="step-pick">
    <div class="card" style="padding:0;overflow:hidden;border:none;">
      <div id="drop-zone">
        <input type="file" id="file-input" accept="video/*">
        <div class="icon">🎬</div>
        <strong>Drag &amp; drop a video here</strong>
        <p>MP4, MOV, MKV, WebM and more</p>
        <button class="btn" onclick="document.getElementById('file-input').click()">Choose File</button>
        <div id="file-selected"></div>
      </div>
    </div>
  </div>

  <!-- Step 2: Metadata -->
  <div id="step-meta">
    <div class="card">
      <div class="section-header">Video details</div>

      <div class="field">
        <label for="title-input">Title</label>
        <input type="text" id="title-input" placeholder="Give your video a title" maxlength="200">
      </div>

      <div class="field">
        <label for="vis-select">Visibility</label>
        <select id="vis-select">
          <option value="public">🌐 Public — anyone can find and watch</option>
          <option value="unlisted">🔗 Unlisted — only people with the link</option>
          <option value="private">🔒 Private — only you</option>
        </select>
      </div>

      <div class="field">
        <label>Thumbnail <span style="font-weight:400;color:var(--text-3)">(optional)</span></label>
        <div class="thumb-row">
          <div class="thumb-preview" onclick="document.getElementById('thumb-input').click()" title="Click to choose thumbnail">
            <img id="thumb-preview-img" alt="Thumbnail preview">
            <span id="thumb-preview-icon">🖼</span>
          </div>
          <div class="thumb-meta">
            <input type="file" id="thumb-input" accept="image/*">
            <div class="thumb-name" id="thumb-name">No image selected</div>
            <div class="hint" style="margin-top:0.4rem;">JPG, PNG, WebP · 16:9 recommended</div>
          </div>
        </div>
      </div>
    </div>

    <div id="error-msg"></div>

    <div class="action-row">
      <button class="btn-primary" id="upload-btn" onclick="startUpload()">Upload Video</button>
      <button class="btn-ghost" onclick="resetToStep1()">← Choose different file</button>
    </div>
  </div>

  <!-- Step 3: Upload progress -->
  <div id="step-upload">
    <div class="card">
      <div id="status-label">Uploading…</div>
      <div id="progress-bar"><div id="progress-fill"></div></div>
      <div id="status-msg"></div>
    </div>
    <div id="result">
      <a id="watch-link" href="#">▶ Watch Video</a>
    </div>
  </div>
</main>
<script>
const CHUNK_SIZE = 5 * 1024 * 1024;

const dropZone       = document.getElementById('drop-zone');
const fileInput      = document.getElementById('file-input');
const thumbInput     = document.getElementById('thumb-input');
const stepPick       = document.getElementById('step-pick');
const stepMeta       = document.getElementById('step-meta');
const stepUpload     = document.getElementById('step-upload');
const titleInput     = document.getElementById('title-input');
const visSelect      = document.getElementById('vis-select');
const thumbPreviewImg = document.getElementById('thumb-preview-img');
const thumbPreviewIcon = document.getElementById('thumb-preview-icon');
const thumbNameEl    = document.getElementById('thumb-name');
const uploadBtn      = document.getElementById('upload-btn');
const statusLabel    = document.getElementById('status-label');
const progressFill   = document.getElementById('progress-fill');
const statusMsg      = document.getElementById('status-msg');
const resultEl       = document.getElementById('result');
const watchLink      = document.getElementById('watch-link');
const errorMsg       = document.getElementById('error-msg');

let selectedFile = null;
let selectedThumb = null;

// ── Step 1: File selection ──
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('video/')) onFileSelected(file);
});
fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) onFileSelected(fileInput.files[0]);
});

function onFileSelected(file) {
  selectedFile = file;
  // Pre-fill title with filename (minus extension).
  titleInput.value = file.name.replace(/\.[^.]+$/, '');
  stepPick.style.display = 'none';
  stepMeta.style.display = 'block';
}

function resetToStep1() {
  selectedFile = null;
  selectedThumb = null;
  fileInput.value = '';
  thumbInput.value = '';
  thumbPreviewImg.style.display = 'none';
  thumbPreviewIcon.style.display = '';
  thumbNameEl.textContent = 'No image selected';
  stepMeta.style.display = 'none';
  stepPick.style.display = 'block';
  errorMsg.style.display = 'none';
}

// ── Thumbnail preview ──
thumbInput.addEventListener('change', () => {
  const f = thumbInput.files[0];
  if (!f) return;
  selectedThumb = f;
  thumbNameEl.textContent = f.name;
  const url = URL.createObjectURL(f);
  thumbPreviewImg.src = url;
  thumbPreviewImg.style.display = 'block';
  thumbPreviewIcon.style.display = 'none';
});

// ── Step 3: Upload ──
function setProgress(pct, label, msg) {
  progressFill.style.width = pct + '%';
  if (label) statusLabel.textContent = label;
  if (msg !== undefined) statusMsg.textContent = msg;
}

function showError(msg) {
  errorMsg.textContent = msg;
  errorMsg.style.display = 'block';
  uploadBtn.disabled = false;
}

async function startUpload() {
  if (!selectedFile) return;
  errorMsg.style.display = 'none';
  uploadBtn.disabled = true;

  const title = titleInput.value.trim() || selectedFile.name.replace(/\.[^.]+$/, '');
  const visibility = visSelect.value;
  const totalChunks = Math.max(1, Math.ceil(selectedFile.size / CHUNK_SIZE));

  // Transition to progress step.
  stepMeta.style.display = 'none';
  stepUpload.style.display = 'block';

  // 1. Init upload.
  let uploadId;
  try {
    const res = await fetch('/api/v1/uploads', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        filename: selectedFile.name,
        title,
        visibility,
        total_chunks: totalChunks,
        expected_size: selectedFile.size,
      }),
    });
    if (!res.ok) throw new Error(await res.text());
    uploadId = (await res.json()).upload_id;
  } catch (e) {
    stepUpload.style.display = 'none';
    stepMeta.style.display = 'block';
    showError('Upload init failed: ' + e.message);
    return;
  }

  // 2. Upload thumbnail (if selected), non-blocking — don't fail the whole upload.
  if (selectedThumb) {
    try {
      const form = new FormData();
      form.append('thumbnail', selectedThumb, selectedThumb.name);
      await fetch(`/api/v1/uploads/${uploadId}/thumbnail`, { method: 'POST', body: form });
    } catch {
      // Thumbnail upload is best-effort.
    }
  }

  // 3. Upload chunks.
  for (let i = 0; i < totalChunks; i++) {
    const start = i * CHUNK_SIZE;
    const chunk = selectedFile.slice(start, start + CHUNK_SIZE);
    setProgress(Math.round((i / totalChunks) * 70), `Uploading… chunk ${i + 1}/${totalChunks}`, '');
    try {
      const res = await fetch(`/api/v1/uploads/${uploadId}/chunks/${i}`, { method: 'PUT', body: chunk });
      if (!res.ok) throw new Error(await res.text());
    } catch (e) {
      stepUpload.style.display = 'none';
      stepMeta.style.display = 'block';
      showError('Upload failed: ' + e.message);
      return;
    }
  }

  // 4. Poll for transcode status.
  setProgress(75, 'Processing…', 'Video is being transcoded');
  watchLink.href = `/watch/${uploadId}`;
  let attempts = 0;

  const poll = async () => {
    if (attempts++ > 600) { showError('Timed out waiting for processing'); return; }
    try {
      const res = await fetch(`/api/v1/videos/${uploadId}/status`);
      if (!res.ok) { setTimeout(poll, 2000); return; }
      const s = await res.json();
      const status = s.video ? s.video.status : null;
      if (status === 'ready') {
        setProgress(100, 'Ready!', 'Transcode complete');
        resultEl.style.display = 'block';
      } else if (status === 'failed') {
        showError('Transcode failed. Check server logs.');
      } else {
        const pct = 75 + Math.round((s.progress || 0) * 25);
        setProgress(pct, 'Processing…', s.job ? (s.job.stage || 'processing') : 'processing');
        setTimeout(poll, 1500);
      }
    } catch { setTimeout(poll, 2000); }
  };
  setTimeout(poll, 1000);
}

const _MOON='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
const _SUN='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
function toggleTheme(){var h=document.documentElement,t=h.getAttribute('data-theme')==='dark'?'light':'dark';h.setAttribute('data-theme',t);localStorage.setItem('theme',t);_updateToggle();}
function _updateToggle(){var isDark=document.documentElement.getAttribute('data-theme')==='dark',btn=document.getElementById('theme-toggle');if(btn)btn.innerHTML=isDark?_SUN:_MOON;}
document.addEventListener('DOMContentLoaded',_updateToggle);
</script>
</body>
</html>
